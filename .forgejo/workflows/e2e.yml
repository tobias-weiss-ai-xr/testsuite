name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout testsuite
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Checkout core/ fork (for DS build)
        run: |
          git clone --depth=1 https://codeberg.org/euro_Office/core.git docker/documentserver/core
          cd docker/documentserver/core
          git submodule update --init --recursive || git clone --depth=1 https://codeberg.org/euro_Office/sdkjs.git sdkjs
      
      - name: Build Docker images
        run: docker compose -f docker-compose.test.yml build
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
      
      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d
      
      - name: Wait for services
        run: ./scripts/wait-for-stack.sh 600
      
      - name: Run E2E tests
        run: npm test
      
      - name: Capture Docker logs (on failure)
        if: failure()
        run: docker compose -f docker-compose.test.yml logs > docker-logs.txt
      
      - name: Upload Docker logs artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
      
      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
